name: Apply Patches
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Apply patches
        run: node .github/workflows/patch.js
      - name: Commit
        run: |
          git config user.email "patch@modeos.io"
          git config user.name "Mode OS Patch"
          git add src/App.js
          git diff --cached --quiet || git commit -m "fix: session, pulse, task flash"
          git push
