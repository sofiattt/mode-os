name: Apply Patches
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix onboard email
        run: |
          sed -i 's/const onboard = async data => {/const onboard = async data => {\n    const boardEmail = email || (()=>{try{return localStorage.getItem("mos_session_email");}catch{return null;}})();/' src/App.js
          sed -i 's/if (email) {/if (boardEmail) {/' src/App.js
          sed -i 's/await sbSet(email, "profile", p);/await sbSet(boardEmail, "profile", p);/' src/App.js
          sed -i 's/await sbSet(email, "history", h);/await sbSet(boardEmail, "history", h);/' src/App.js
          sed -i 's/await sbSet(email, "week", w);/await sbSet(boardEmail, "week", w);/' src/App.js
          sed -i 's/setEmail(email);/setEmail(boardEmail);/' src/App.js
          echo "Done"
      - name: Commit
        run: |
          git config user.email "patch@modeos.io"
          git config user.name "Mode OS Patch"
          git add src/App.js
          git diff --cached --quiet || git commit -m "fix: onboard email null"
          git push
