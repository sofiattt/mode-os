name: Apply Patches
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix key whitespace
        run: |
          node .github/workflows/patch.js
          echo "Done"
      - name: Commit
        run: |
          git config user.email "patch@modeos.io"
          git config user.name "Mode OS Patch"
          git add src/App.js
          git diff --cached --quiet || git commit -m "Fix: strip whitespace from SB_KEY"
          git push
